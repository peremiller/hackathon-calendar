<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HackCal · Tech Hackathon Calendar</title>
<style>
  :root{
    --bg:#0b0f1a; --grad:#16203a; --panel:#121829; --panel2:#1a2138; --line:#26304d;
    --txt:#e8edf7; --muted:#94a3c4; --accent:#6c8cff; --accent2:#22d3ee;
    --good:#34d399; --warn:#fbbf24; --bad:#fb7185; --chip:#1f2945;
    --headbg:rgba(11,15,26,.82);
    --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  :root[data-theme="light"]{
    --bg:#eef2fb; --grad:#dde6fb; --panel:#ffffff; --panel2:#f3f6fd; --line:#d7deee;
    --txt:#1b2238; --muted:#5a6585; --accent:#4f6bff; --accent2:#0891b2;
    --good:#059669; --warn:#b45309; --bad:#e11d48; --chip:#eef2fb;
    --headbg:rgba(255,255,255,.86);
    --shadow:0 10px 28px rgba(40,55,90,.12);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%,var(--grad) 0%,var(--bg) 55%);
    color:var(--txt); min-height:100vh; line-height:1.45;
    transition:background .25s,color .25s;
  }
  header{
    position:sticky; top:0; z-index:20; backdrop-filter:blur(10px);
    background:var(--headbg); border-bottom:1px solid var(--line);
  }
  .bar{max-width:1180px; margin:0 auto; padding:14px 20px; display:flex; align-items:center; gap:16px; flex-wrap:wrap}
  .brand{display:flex; align-items:center; gap:10px; font-weight:800; font-size:20px; letter-spacing:.3px}
  .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;font-size:17px;box-shadow:var(--shadow)}
  .brand small{display:block;font-weight:500;font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
  .spacer{flex:1}
  .btn{
    border:1px solid var(--line); background:var(--panel2); color:var(--txt);
    padding:8px 14px; border-radius:10px; cursor:pointer; font-size:14px; font-weight:600;
    display:inline-flex; align-items:center; gap:7px; transition:.15s; white-space:nowrap;
  }
  .btn:hover{border-color:var(--accent); transform:translateY(-1px)}
  .btn.primary{background:linear-gradient(135deg,var(--accent),#5a7bff); border-color:transparent}
  .seg{display:flex; border:1px solid var(--line); border-radius:10px; overflow:hidden}
  .seg button{background:var(--panel); border:0; color:var(--muted); padding:8px 14px; cursor:pointer; font-weight:600; font-size:13px}
  .seg button.on{background:var(--accent); color:#fff}

  main{max-width:1180px; margin:0 auto; padding:20px}
  .controls{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:18px}
  input,select,textarea{
    background:var(--panel); border:1px solid var(--line); color:var(--txt);
    padding:9px 12px; border-radius:10px; font-size:14px; font-family:inherit;
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
  .search{flex:1; min-width:200px}
  .chips{display:flex; gap:8px; flex-wrap:wrap}
  .chip{
    background:var(--chip); border:1px solid var(--line); color:var(--muted);
    padding:6px 12px; border-radius:999px; font-size:12.5px; cursor:pointer; font-weight:600; transition:.15s;
  }
  .chip.on{background:var(--accent); color:#fff; border-color:transparent}

  /* Calendar */
  .cal-head{display:flex; align-items:center; justify-content:center; gap:18px; margin-bottom:14px}
  .cal-head h2{margin:0; font-size:20px; min-width:200px; text-align:center}
  .nav{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);cursor:pointer;font-size:18px}
  .nav:hover{border-color:var(--accent)}
  .grid{display:grid; grid-template-columns:repeat(7,1fr); gap:8px}
  .dow{text-align:center; color:var(--muted); font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; padding:4px 0}
  .cell{
    min-height:110px; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:8px;
    display:flex; flex-direction:column; gap:5px; overflow:hidden;
  }
  .cell.out{opacity:.38}
  .cell.today{border-color:var(--accent); box-shadow:0 0 0 1px var(--accent) inset}
  .daynum{font-size:13px; font-weight:700; color:var(--muted); display:flex; justify-content:space-between; align-items:center}
  .cell.today .daynum{color:var(--accent)}
  .ev{
    font-size:11.5px; padding:3px 7px; border-radius:7px; cursor:pointer; font-weight:600;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; border-left:3px solid;
    background:var(--panel2);
  }
  .ev:hover{filter:brightness(1.25)}
  .more{font-size:11px; color:var(--muted); cursor:pointer; padding-left:4px}

  /* List */
  .list{display:flex; flex-direction:column; gap:12px}
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px;
    display:flex; gap:16px; align-items:flex-start; cursor:pointer; transition:.15s; box-shadow:var(--shadow);
  }
  .card:hover{border-color:var(--accent); transform:translateY(-2px)}
  .date-badge{
    flex-shrink:0; width:64px; text-align:center; background:var(--panel2); border-radius:12px; padding:8px 0; border:1px solid var(--line);
  }
  .date-badge .m{font-size:11px; color:var(--accent2); font-weight:800; text-transform:uppercase; letter-spacing:.5px}
  .date-badge .d{font-size:24px; font-weight:800; line-height:1}
  .date-badge .y{font-size:10px; color:var(--muted)}
  .card h3{margin:0 0 4px; font-size:16.5px}
  .meta{display:flex; gap:8px; flex-wrap:wrap; margin-top:8px}
  .tag{font-size:11px; padding:3px 9px; border-radius:999px; background:var(--chip); color:var(--muted); font-weight:600; border:1px solid var(--line)}
  .tag.fmt{color:#fff}
  .reg{font-size:11px; padding:3px 9px; border-radius:999px; font-weight:700; border:1px solid transparent; white-space:nowrap}
  .reg.open{color:var(--good); border-color:color-mix(in srgb,var(--good) 45%,transparent); background:color-mix(in srgb,var(--good) 14%,transparent)}
  .reg.soon{color:var(--warn); border-color:color-mix(in srgb,var(--warn) 50%,transparent); background:color-mix(in srgb,var(--warn) 15%,transparent)}
  .reg.closed{color:var(--muted); border-color:var(--line); background:var(--chip)}
  .reg.preopen{color:var(--accent2); border-color:color-mix(in srgb,var(--accent2) 45%,transparent); background:color-mix(in srgb,var(--accent2) 13%,transparent)}
  .card p{margin:6px 0 0; color:var(--muted); font-size:13.5px}
  .countdown{margin-left:auto; flex-shrink:0; text-align:right; font-size:12px; color:var(--muted)}
  .countdown b{display:block; font-size:18px; color:var(--accent2)}

  .empty{text-align:center; color:var(--muted); padding:60px 20px}
  .stats{display:flex; gap:20px; flex-wrap:wrap; margin-bottom:18px; color:var(--muted); font-size:13px}
  .stats b{color:var(--txt); font-size:18px; display:block}

  /* Modal */
  .modal-bg{position:fixed; inset:0; background:rgba(5,8,15,.7); backdrop-filter:blur(3px); display:none; place-items:center; z-index:50; padding:20px}
  .modal-bg.show{display:grid}
  .modal{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:24px; width:min(560px,100%); max-height:88vh; overflow:auto; box-shadow:var(--shadow)}
  .modal h2{margin:0 0 4px}
  .modal .close{float:right; cursor:pointer; color:var(--muted); font-size:22px; line-height:1; background:none;border:0}
  .field{margin-top:14px; display:flex; flex-direction:column; gap:6px}
  .field label{font-size:12.5px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.4px}
  .field input,.field select,.field textarea{width:100%}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .modal-actions{display:flex; gap:10px; margin-top:22px; justify-content:flex-end}
  .det-row{display:flex; gap:10px; margin-top:10px; font-size:14px}
  .det-row .k{color:var(--muted); width:90px; flex-shrink:0; font-weight:600}
  a.link{color:var(--accent2); text-decoration:none}
  a.link:hover{text-decoration:underline}
  footer{text-align:center; color:var(--muted); font-size:12px; padding:30px}
  @media(max-width:720px){
    .cell{min-height:74px}
    .ev{font-size:10px}
    .countdown{display:none}
    .date-badge{width:54px}
  }
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="brand"><span class="logo">⚡</span><div>HackCal<small>Tech Hackathon Calendar</small></div></div>
    <div class="spacer"></div>
    <div class="seg" id="viewSeg">
      <button data-view="month" class="on">📅 Calendar</button>
      <button data-view="list">📋 List</button>
    </div>
    <button class="btn" id="importBtn">📥 Import</button>
    <button class="btn" id="syncBtn">🔄 Sync Discord</button>
    <button class="btn" id="icsBtn">⬇ Export .ics</button>
    <button class="btn primary" id="addBtn">＋ Add Hackathon</button>
    <button class="btn" id="themeBtn" title="Toggle light / dark" aria-label="Toggle light or dark theme">🌙</button>
  </div>
</header>

<main>
  <div class="stats" id="stats"></div>

  <div class="controls">
    <input class="search" id="search" placeholder="🔎 Search hackathons, tech, location…">
    <select id="fmtFilter">
      <option value="">All formats</option>
      <option value="Online">Online</option>
      <option value="In-person">In-person</option>
      <option value="Hybrid">Hybrid</option>
    </select>
    <label class="chip" id="upcomingOnly" style="display:inline-flex;align-items:center;gap:6px">
      <input type="checkbox" id="upChk" style="accent-color:var(--accent)"> Upcoming only
    </label>
    <label class="chip" style="display:inline-flex;align-items:center;gap:6px">
      <input type="checkbox" id="openChk" style="accent-color:var(--accent)"> 🟢 Open to register
    </label>
  </div>
  <div class="chips" id="tagChips"></div>

  <!-- Calendar view -->
  <section id="monthView">
    <div class="cal-head">
      <button class="nav" id="prevM">‹</button>
      <h2 id="monthLabel"></h2>
      <button class="nav" id="nextM">›</button>
      <button class="btn" id="todayBtn" style="margin-left:8px">Today</button>
    </div>
    <div class="grid" id="dow"></div>
    <div class="grid" id="calGrid" style="margin-top:8px"></div>
  </section>

  <!-- List view -->
  <section id="listView" style="display:none">
    <div class="list" id="listEl"></div>
  </section>
</main>

<!-- Detail / Add modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal"></div>
</div>

<footer>HackCal — runs entirely in your browser · data saved to localStorage · <span id="ver"></span></footer>

<script>
const STORE='hackcal.v1';
const TECH=['AI/ML','Web3','FinTech','HealthTech','Climate','Gaming','AR/VR','Robotics','Cybersecurity','Open Source','Mobile','Data','DevTools','Hardware'];
const FMT_COLORS={'Online':'#22d3ee','In-person':'#fb7185','Hybrid':'#a78bfa'};
const $=s=>document.querySelector(s);
const pad=n=>String(n).padStart(2,'0');
const uid=()=>{
  try{ if(crypto&&crypto.randomUUID) return crypto.randomUUID(); }catch(e){}
  return 'id-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,10);
};
const todayISO=()=>{const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`};

/* ---- seed data (illustrative recurring tech hackathons, dated forward) ---- */
function seed(){
  const Y=new Date().getFullYear();
  const iso=dt=>`${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`;
  const mk=(name,m,d,len,fmt,loc,tags,url,desc)=>{
    let yr=Y; const start=new Date(Y,m-1,d);
    if(start < new Date(new Date().toDateString())) yr=Y+1;
    const s=`${yr}-${pad(m)}-${pad(d)}`;
    const e=new Date(yr,m-1,d+len-1);
    const rc=new Date(yr,m-1,d-4);                // registration closes ~4 days before start
    return {id:uid(),name,start:s,end:iso(e),regClose:iso(rc),fmt,loc,tags,url,desc};
  };
  return [
    mk('MLH Global Hack Week',1,18,7,'Online','Global / Virtual',['AI/ML','Open Source','DevTools'],'https://ghw.mlh.com/','Major League Hacking’s beginner-friendly week-long online event (successor to Local Hack Day).'),
    mk('ETHGlobal Hackathon',3,14,3,'In-person','San Francisco, USA',['Web3','Open Source'],'https://ethglobal.com','Flagship Ethereum builder hackathon with major sponsor bounties.'),
    mk('AI Engineer World’s Fair',2,21,2,'In-person','San Francisco, USA',['AI/ML','DevTools','Data'],'https://www.ai.engineer/','Build agents, RAG pipelines and LLM apps; hackathon runs alongside the fair.'),
    mk('NASA Space Apps Challenge',10,4,2,'Hybrid','Global / 300+ cities',['Data','Open Source','Hardware'],'https://www.spaceappschallenge.org','The world’s largest annual civic hackathon, run with NASA open data.'),
    mk('Hack the North',9,12,3,'In-person','Waterloo, Canada',['AI/ML','Web3','Mobile'],'https://hackthenorth.com','Canada’s biggest hackathon — 1,000+ students, 36 hours.'),
    mk('ClimateHack.AI',4,25,2,'Hybrid','Global / Virtual',['Climate','Data','AI/ML'],'https://climatehack.ai/','Multi-university machine-learning competition tackling climate problems.'),
    mk('Money20/20 Hackathon',5,16,2,'In-person','Las Vegas, USA',['FinTech','Cybersecurity','Data'],'https://www.money2020.com/','Payments, open banking and fraud challenges at the Money20/20 fintech festival.'),
    mk('MIT Hacking Medicine GrandHack',6,7,2,'In-person','Cambridge, USA',['HealthTech','AI/ML'],'https://hackingmedicine.mit.edu/','Clinicians + engineers building patient-care prototypes; MIT’s flagship health hackathon.'),
    mk('Global Game Jam',7,11,3,'Online','Global / Virtual',['Gaming','AR/VR'],'https://globalgamejam.org','The world’s largest game-jam — build a playable game to a shared theme.'),
    mk('TreeHacks',2,14,3,'In-person','Stanford, USA',['AI/ML','HealthTech','Climate'],'https://treehacks.com','Stanford’s premier hackathon with deep-tech tracks.'),
    mk('picoCTF',8,22,2,'Online','Global / Virtual',['Cybersecurity','DevTools'],'https://picoctf.org/','Carnegie Mellon’s free, beginner-friendly annual capture-the-flag.'),
    mk('MakeMIT',11,8,2,'In-person','Cambridge, USA',['Robotics','Hardware'],'https://makemit.net/','MIT’s 24-hour hardware hackathon with on-site fab-lab access.'),
    mk('Junction',11,21,3,'In-person','Helsinki, Finland',['AI/ML','Web3','Hardware'],'https://www.hackjunction.com','Europe’s leading hackathon, 1,500 hackers.'),
    mk('PennApps',9,27,2,'In-person','Philadelphia, USA',['Mobile','DevTools'],'https://pennapps.com/','The original college hackathon — beginner-accessible, ship in 36 hours.'),
    mk('Hacktoberfest',10,18,1,'Online','Global / Virtual',['Open Source','DevTools'],'https://hacktoberfest.com/','DigitalOcean’s month-long October open-source contribution event.'),
    mk('MIT Reality Hack',1,24,3,'In-person','MIT, Cambridge, USA',['AR/VR','Gaming','AI/ML'],'https://www.realityhackatmit.com','XR-focused hackathon with headset hardware loans.'),
  ];
}

let data;
data = load();
function load(){
  try{const v=JSON.parse(localStorage.getItem(STORE)); if(v&&v.length) return v;}catch(e){}
  const s=seed(); save(s); return s;
}
function save(d){data=d||data; localStorage.setItem(STORE,JSON.stringify(data))}

/* ---- state ---- */
let view='month';
let cur=new Date(); cur.setDate(1);
let activeTags=new Set();
let q='', fmtF='', upOnly=false, openOnly=false;

/* ---- filtering ---- */
function filtered(){
  const t=todayISO();
  return data.filter(ev=>{
    if(fmtF && ev.fmt!==fmtF) return false;
    if(upOnly && ev.end < t) return false;
    if(openOnly && !isOpenForReg(ev)) return false;
    if(activeTags.size && !ev.tags.some(x=>activeTags.has(x))) return false;
    if(q){
      const hay=(ev.name+' '+ev.loc+' '+ev.tags.join(' ')+' '+(ev.desc||'')).toLowerCase();
      if(!hay.includes(q.toLowerCase())) return false;
    }
    return true;
  });
}

/* ---- rendering ---- */
function renderStats(){
  const t=todayISO();
  const up=data.filter(e=>e.end>=t).length;
  const openNow=data.filter(isOpenForReg).length;
  const next=[...data].filter(e=>e.start>=t).sort((a,b)=>a.start.localeCompare(b.start))[0];
  let days='—';
  if(next){const dd=Math.ceil((new Date(next.start)-new Date(t))/864e5); days=dd===0?'Today':dd+'d'}
  $('#stats').innerHTML=`
    <div><b>${data.length}</b> total events</div>
    <div><b>${up}</b> upcoming</div>
    <div><b>${openNow}</b> 🟢 open to register</div>
    <div><b>${days}</b> to next ${next?'· '+next.name:''}</div>`;
}

function renderChips(){
  const el=$('#tagChips'); el.innerHTML='';
  TECH.forEach(t=>{
    const c=document.createElement('div');
    c.className='chip'+(activeTags.has(t)?' on':'');
    c.textContent=t;
    c.onclick=()=>{activeTags.has(t)?activeTags.delete(t):activeTags.add(t); render()};
    el.appendChild(c);
  });
}

function evColor(ev){return FMT_COLORS[ev.fmt]||'#6c8cff'}

function renderMonth(){
  const dowEl=$('#dow'); dowEl.innerHTML='';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{
    const x=document.createElement('div'); x.className='dow'; x.textContent=d; dowEl.appendChild(x);
  });
  $('#monthLabel').textContent=cur.toLocaleString('default',{month:'long',year:'numeric'});
  const grid=$('#calGrid'); grid.innerHTML='';
  const first=new Date(cur.getFullYear(),cur.getMonth(),1);
  const startDow=first.getDay();
  const daysIn=new Date(cur.getFullYear(),cur.getMonth()+1,0).getDate();
  const prevDays=new Date(cur.getFullYear(),cur.getMonth(),0).getDate();
  const evs=filtered();
  const cells=[];
  for(let i=0;i<startDow;i++) cells.push({d:prevDays-startDow+1+i,out:true,mo:cur.getMonth()-1});
  for(let i=1;i<=daysIn;i++) cells.push({d:i,out:false,mo:cur.getMonth()});
  while(cells.length%7) cells.push({d:cells.length-startDow-daysIn+1,out:true,mo:cur.getMonth()+1});

  cells.forEach(c=>{
    const dt=new Date(cur.getFullYear(),c.mo,c.d);
    const iso=`${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`;
    const cell=document.createElement('div');
    cell.className='cell'+(c.out?' out':'')+(iso===todayISO()?' today':'');
    cell.innerHTML=`<div class="daynum"><span>${c.d}</span></div>`;
    const dayEvs=evs.filter(e=>iso>=e.start && iso<=e.end);
    const shown=dayEvs.slice(0,3);
    shown.forEach(e=>{
      const x=document.createElement('div');
      x.className='ev'; x.style.borderLeftColor=evColor(e);
      x.textContent=regStatus(e).dot+' '+e.name; x.title=e.name+' — '+regStatus(e).label;
      x.onclick=ev=>{ev.stopPropagation(); openDetail(e)};
      cell.appendChild(x);
    });
    if(dayEvs.length>3){
      const m=document.createElement('div'); m.className='more'; m.textContent=`+${dayEvs.length-3} more`;
      m.onclick=ev=>{ev.stopPropagation(); openDetail(dayEvs[3])};
      cell.appendChild(m);
    }
    grid.appendChild(cell);
  });
}

function fmtDate(iso){const d=new Date(iso+'T00:00');return d.toLocaleDateString('default',{month:'short',day:'numeric',year:'numeric'})}
function fmtShort(iso){const d=new Date(iso+'T00:00');return d.toLocaleDateString('default',{month:'short',day:'numeric'})}
function daysBetween(a,b){return Math.ceil((new Date(a)-new Date(b))/864e5)}
// Registration status for an event, derived from regOpen/regClose (or start as fallback).
function regStatus(e){
  const t=todayISO();
  if(e.end < t) return {label:'Event ended', cls:'closed', dot:'⚪'};
  if(e.regOpen && t < e.regOpen) return {label:'Opens '+fmtShort(e.regOpen), cls:'preopen', dot:'🔵'};
  const rc = e.regClose || e.start;
  if(t > rc){
    // deadline passed but event not over → registration closed (may be in progress)
    return {label: e.start<=t ? 'Registration closed · in progress' : 'Registration closed', cls:'closed', dot:'🔴'};
  }
  const days=daysBetween(rc,t);
  if(days<=7) return {label: days<=0?'Closes today':`Closing soon · ${days}d left`, cls:'soon', dot:'🟠'};
  return {label:`Open · until ${fmtShort(rc)}`, cls:'open', dot:'🟢'};
}
function isOpenForReg(e){const s=regStatus(e);return s.cls==='open'||s.cls==='soon'}
function renderList(){
  const el=$('#listEl'); el.innerHTML='';
  const t=todayISO();
  const evs=filtered().sort((a,b)=>a.start.localeCompare(b.start));
  if(!evs.length){el.innerHTML='<div class="empty">No hackathons match your filters.<br>Try clearing tags or search.</div>';return}
  evs.forEach(e=>{
    const d=new Date(e.start+'T00:00');
    const dd=Math.ceil((new Date(e.start)-new Date(t))/864e5);
    const cd= e.end<t ? 'Past' : (dd<=0?'Live / Today':dd+' days');
    const span = e.start!==e.end ? ` – ${fmtDate(e.end)}` : '';
    const card=document.createElement('div'); card.className='card'; card.onclick=()=>openDetail(e);
    card.innerHTML=`
      <div class="date-badge">
        <div class="m">${d.toLocaleString('default',{month:'short'})}</div>
        <div class="d">${d.getDate()}</div>
        <div class="y">${d.getFullYear()}</div>
      </div>
      <div style="flex:1">
        <h3>${esc(e.name)}</h3>
        <div style="color:var(--muted);font-size:13px">${fmtDate(e.start)}${span} · ${esc(e.loc)}</div>
        ${e.desc?`<p>${esc(e.desc)}</p>`:''}
        <div class="meta">

/* ---- .ics export ---- */
function icsDate(iso){return iso.replace(/-/g,'')}
function icsForEvents(evs){
  let out='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//HackCal//EN\r\nCALSCALE:GREGORIAN\r\n';
  evs.forEach(e=>{
    const endNext=new Date(e.end+'T00:00'); endNext.setDate(endNext.getDate()+1);
    const dtend=`${endNext.getFullYear()}${pad(endNext.getMonth()+1)}${pad(endNext.getDate())}`;
    out+='BEGIN:VEVENT\r\n';
    out+=`UID:${e.id}@hackcal\r\n`;
    out+=`DTSTART;VALUE=DATE:${icsDate(e.start)}\r\n`;
    out+=`DTEND;VALUE=DATE:${dtend}\r\n`;
    out+=`SUMMARY:${icsEsc(e.name)}\r\n`;
    out+=`LOCATION:${icsEsc(e.loc)}\r\n`;
    out+=`DESCRIPTION:${icsEsc((e.fmt+' · '+e.tags.join(', ')+(e.desc?' — '+e.desc:'')+(e.url?'\\n'+e.url:'')))}\r\n`;
    if(e.url) out+=`URL:${e.url}\r\n`;
    out+='END:VEVENT\r\n';
  });
  out+='END:VCALENDAR\r\n'; return out;
}
function icsEsc(s){return String(s).replace(/[\\,;]/g,m=>'\\'+m).replace(/\n/g,'\\n')}
function downloadFile(name,text){
  const b=new Blob([text],{type:'text/calendar'}); const u=URL.createObjectURL(b);
  const a=document.createElement('a'); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u);
}
function downloadICS(id){const e=data.find(x=>x.id===id); downloadFile(slug(e.name)+'.ics',icsForEvents([e]))}
function slug(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}

/* ---- import: parse Discord / WhatsApp message text into events ---- */
var parsedPreview=[];
const MONTHS={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,sept:8,oct:9,nov:10,dec:11,
  january:0,february:1,march:2,april:3,june:5,july:6,august:7,september:8,october:9,november:10,december:11};
function inferYear(y,mo,d){
  if(y) return y<100?y+2000:y;
  const now=new Date(new Date().toDateString()); let yr=now.getFullYear();
  if(new Date(yr,mo,d)<now) yr++; return yr;
}
const isoOf=(y,mo,d)=>`${y}-${pad(mo+1)}-${pad(d)}`;
const ctxYear=t=>{const m=t.match(/\b(20\d{2})\b/);return m?+m[1]:null;};
function parseDates(text){
  let m;
  const reMD=/\b(jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t)?(?:ember)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)\.?\s+(\d{1,2})(?:\s*(?:[-–—]|to)\s*(\d{1,2}))?(?:[,\s]+(\d{4}))?/i;
  if(m=text.match(reMD)){
    const mo=MONTHS[m[1].toLowerCase().replace('.','')], d1=+m[2], d2=m[3]?+m[3]:null;
    const yr=inferYear(m[4]?+m[4]:ctxYear(text),mo,d1);
    return {start:isoOf(yr,mo,d1),end:isoOf(yr,mo,d2||d1)};
  }
  const reDM=/\b(\d{1,2})\s+(jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t)?(?:ember)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)\.?(?:\s+(\d{4}))?/i;
  if(m=text.match(reDM)){
    const mo=MONTHS[m[2].toLowerCase().replace('.','')], d=+m[1]; const yr=inferYear(m[3]?+m[3]:ctxYear(text),mo,d);
    return {start:isoOf(yr,mo,d),end:isoOf(yr,mo,d)};
  }
  const reISO=/(\d{4})-(\d{2})-(\d{2})(?:\s*(?:[-–—]|to)\s*(\d{4})-(\d{2})-(\d{2}))?/;
  if(m=text.match(reISO)){
    const start=`${m[1]}-${m[2]}-${m[3]}`; return {start,end:m[4]?`${m[4]}-${m[5]}-${m[6]}`:start};
  }
  const reNum=/\b(\d{1,2})[\/.](\d{1,2})(?:[\/.](\d{2,4}))?\b/;
  if(m=text.match(reNum)){
    let a=+m[1],b=+m[2],y=m[3]?+m[3]:null,mo,d;
    if(a>12){d=a;mo=b-1;} else if(b>12){mo=a-1;d=b;} else {mo=a-1;d=b;}
    if(mo<0||mo>11||d<1||d>31) return null;
    return {start:isoOf(inferYear(y,mo,d),mo,d),end:isoOf(inferYear(y,mo,d),mo,d)};
  }
  return null;
}
function stripChatMeta(line){
  let s=line;
  // WhatsApp prefix: [12/03/2026, 19:00] Name:  /  12/03/2026, 7:00 PM - Name:
  const wa=/^\s*\[?\d{1,2}[\/.]\d{1,2}[\/.]\d{2,4},?\s+\d{1,2}:\d{2}(?::\d{2})?\s*(?:[AaPp][Mm])?\]?\s*[-–]?\s*(?:[^:\n]{1,40}:\s+)?/;
  if(wa.test(s)) s=s.replace(wa,'');
  // Discord "Name Today at 7:00 PM" header noise
  s=s.replace(/\b(Today|Yesterday)\s+at\s+\d{1,2}:\d{2}\s*(?:[AaPp][Mm])?/gi,'');
  return s.trim();
}
function pickFmt(t){
  if(/\bhybrid\b/i.test(t)) return 'Hybrid';
  if(/\b(online|virtual|remote)\b/i.test(t)) return 'Online';
  if(/\b(in[- ]?person|on[- ]?site|onsite|venue)\b/i.test(t)) return 'In-person';
  return 'Online';
}
function pickLoc(t,fmt){
  let m=t.match(/(?:venue|location|where|place)\s*[:\-]\s*([^\n]+)/i);
  if(m) return m[1].trim().slice(0,60);
  m=t.match(/\bat\s+([A-Z][A-Za-z0-9 '&-]{2,40})/);
  if(m) return m[1].trim().replace(/[.,]+$/,'');
  if(/\b(online|virtual|remote|discord|zoom|gather)\b/i.test(t)) return 'Online / Virtual';
  return fmt==='Online'?'Online / Virtual':'TBD';
}
const TAGMAP=[
  [/\b(ai|machine learning|ml|llm|genai|deep learning|agents?)\b/i,'AI/ML'],
  [/\b(web3|blockchain|crypto|ethereum|solana|defi|nft)\b/i,'Web3'],
  [/\b(fintech|payments?|banking)\b/i,'FinTech'],
  [/\b(health|medical|biotech|medtech)\b/i,'HealthTech'],
  [/\b(climate|sustainab|carbon|cleantech|energy)\b/i,'Climate'],
  [/\b(game|gaming|gamedev|game ?jam)\b/i,'Gaming'],
  [/\b(ar|vr|xr|augmented|virtual reality|metaverse)\b/i,'AR/VR'],
  [/\b(robot|robotics)\b/i,'Robotics'],
  [/\b(security|cyber|infosec|ctf)\b/i,'Cybersecurity'],
  [/\b(open ?source|oss)\b/i,'Open Source'],
  [/\b(mobile|ios|android|flutter|react native)\b/i,'Mobile'],
  [/\b(data|datathon|analytics)\b/i,'Data'],
  [/\b(devtools?|developer tools?|api|sdk)\b/i,'DevTools'],
  [/\b(hardware|iot|embedded|electronics)\b/i,'Hardware'],
];
function pickTags(t){const out=[];TAGMAP.forEach(([re,tag])=>{if(re.test(t)&&!out.includes(tag))out.push(tag)});return out.slice(0,5)}
function pickTitle(text){
  let line=(text.split('\n').find(l=>/[a-z]/i.test(l.replace(/https?:\/\/\S+/g,'')))||text.split('\n')[0]||'')
    .replace(/https?:\/\/\S+/g,'').trim();
  // Cut the name at the earliest of: a date, a sentence end, or a connector phrase.
  const cuts=[];
  const dm=line.match(/\b(?:jan|feb|mar|apr|may|jun|jul|aug|sep|sept|oct|nov|dec)[a-z]*\.?\s*\d{1,2}\b|\b\d{4}-\d{2}-\d{2}\b|\b\d{1,2}[\/.]\d{1,2}(?:[\/.]\d{2,4})?\b/i);
  if(dm) cuts.push(dm.index);
  [/\bis\s+(?:online|virtual|in[- ]?person|hybrid|happening|on)\b/i,/\bhappening\b/i,/\bon\b/i,/[.!?]/,/\s[—–-]\s/].forEach(re=>{const mm=line.match(re); if(mm)cuts.push(mm.index)});
  const cut=Math.min(...cuts.filter(i=>i>=3));
  let title=(isFinite(cut)?line.slice(0,cut):line)
    .replace(/[#*_>•]+/g,' ').replace(/\s{2,}/g,' ').replace(/^[\s\-–—:,]+|[\s\-–—:,]+$/g,'').trim();
  if(title.length>=3) return title.slice(0,80);
  line=line.replace(/[#*_>•]+/g,' ').replace(/\s{2,}/g,' ').trim();
  return (line||'Imported event').slice(0,80);
}
function pickRegClose(text){
  let m=text.match(/(?:register|registration|sign[\s-]?up|apply|applications?|rsvp|submission|submit)[^\n]{0,24}?(?:by|before|closes?|deadline|until|ends?|due)\b\s*:?\s*([^\n,.;!]{4,40})/i)
       || text.match(/(?:deadline|closes?|cutoff)\s*:?\s*([^\n,.;!]{4,40})/i);
  if(m){const d=parseDates(m[1]); if(d) return d.start;}
  return '';
}
function buildEvent(text,dates,source){
  const url=(text.match(/https?:\/\/\S+/)||[''])[0].replace(/[).,]+$/,'');
  const fmt=pickFmt(text);
  return {id:uid(),name:pickTitle(text),start:dates.start,end:dates.end,fmt,
    loc:pickLoc(text,fmt),tags:pickTags(text),url,regClose:pickRegClose(text),
    desc:text.replace(/\s+/g,' ').trim().slice(0,240),src:source||'Import'};
}
const isWAStart=l=>/^\s*\[?\d{1,2}[\/.]\d{1,2}[\/.]\d{2,4},?\s+\d{1,2}:\d{2}/.test(l);
const isDiscordHeader=l=>/(Today|Yesterday)\s+at\s+\d{1,2}:\d{2}/i.test(l);
// Reconstruct individual messages from pasted chat text, so each event is its
// own candidate (WhatsApp = one message per line; Discord = name/time header
// line followed by the message body; plain paste = blank-line separated blocks).
function segmentMessages(raw){
  const lines=(raw||'').split(/\r?\n/); const msgs=[]; let cur=null;
  for(const ln of lines){
    if(isWAStart(ln)){ const body=stripChatMeta(ln); cur={l:[]}; msgs.push(cur); if(body)cur.l.push(body); }
    else if(isDiscordHeader(ln)){ cur={l:[]}; msgs.push(cur); }   // drop the "Name Today at…" header
    else if(!ln.trim()){ cur=null; }                              // blank line = boundary
    else { const body=stripChatMeta(ln); if(!body)continue; if(!cur){cur={l:[]};msgs.push(cur);} cur.l.push(body); }
  }
  return msgs.map(m=>m.l.join('\n').trim()).filter(Boolean);
}
function parseEvents(raw,source){
  const events=[];
  for(const text of segmentMessages(raw)){
    const dates=parseDates(text); if(!dates) continue;
    events.push(buildEvent(text,dates,source));
  }
  return events;
}
function evKey(e){return (e.name||'').toLowerCase().replace(/[^a-z0-9]/g,'')+'|'+e.start}
function mergeEvents(newEvs){
  const seen=new Set(data.map(evKey)); let added=0;
  newEvs.forEach(e=>{ const k=evKey(e); if(!seen.has(k)){data.push(e);seen.add(k);added++;} });
  if(added) save();
  return added;
}
function toast(msg){
  const t=document.createElement('div'); t.textContent=msg;
  t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:12px 20px;border-radius:12px;font-weight:600;box-shadow:var(--shadow);z-index:100;max-width:90vw;text-align:center';
  document.body.appendChild(t); setTimeout(()=>t.remove(),3400);
}
function openImport(){
  $('#modal').innerHTML=`
    <button class="close" onclick="closeModal()">×</button>
    <h2>Import events</h2>
    <p style="color:var(--muted);font-size:13px;margin:4px 0 0">Paste messages copied from your <b>Discord</b> channel or <b>WhatsApp</b> group. HackCal detects the date, title, format, location, tech tags and link — review before importing.</p>
    <div class="field"><label>Source</label>
      <select id="imp_src"><option value="Discord">Discord</option><option value="WhatsApp">WhatsApp</option><option value="Import">Other / mixed</option></select>
    </div>
    <div class="field"><label>Pasted text</label>
      <textarea id="imp_text" rows="7" placeholder="ETHGlobal Hackathon — March 14-16, 2026 at San Francisco.&#10;AI & web3 tracks, in-person. Register https://ethglobal.com"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="runParse()">Parse →</button>
    </div>
    <div id="imp_preview"></div>`;
  showModal();
}
function runParse(){
  const src=$('#imp_src').value;
  parsedPreview=parseEvents($('#imp_text').value,src);
  const box=$('#imp_preview');
  if(!parsedPreview.length){
    box.innerHTML='<p style="color:var(--bad);margin-top:14px;font-size:13.5px">No events with a recognizable date found. Make sure each event includes a date like “March 14”, “14 March 2026” or “2026-03-14”.</p>';
    return;
  }
  box.innerHTML=`<div style="margin-top:18px;border-top:1px solid var(--line);padding-top:14px">
    <b>${parsedPreview.length} event${parsedPreview.length>1?'s':''} detected</b>
    <div id="imp_list" style="display:flex;flex-direction:column;gap:8px;margin-top:10px"></div>
    <div class="modal-actions"><button class="btn primary" onclick="confirmImport()">＋ Import selected</button></div></div>`;
  const list=$('#imp_list');
  parsedPreview.forEach((e,i)=>{
    const row=document.createElement('label');
    row.style.cssText='display:flex;gap:10px;align-items:flex-start;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px;cursor:pointer';
    row.innerHTML=`<input type="checkbox" data-i="${i}" checked style="margin-top:3px;accent-color:var(--accent)">
      <div style="flex:1">
        <div style="font-weight:700">${esc(e.name)}</div>
        <div style="color:var(--muted);font-size:12.5px">${fmtDate(e.start)}${e.start!==e.end?' – '+fmtDate(e.end):''} · ${e.fmt} · ${esc(e.loc)}</div>
        ${e.tags.length?`<div class="meta">${e.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:''}
      </div>`;
    list.appendChild(row);
  });
}
function confirmImport(){
  const checked=[...document.querySelectorAll('#imp_list input:checked')].map(c=>parsedPreview[+c.dataset.i]);
  if(!checked.length){toast('Nothing selected');return}
  const added=mergeEvents(checked);
  const dupes=checked.length-added;
  closeModal(); render();
  toast(`Imported ${added} event${added===1?'':'s'}`+(dupes>0?` · ${dupes} duplicate${dupes===1?'':'s'} skipped`:''));
}

/* ---- Discord auto-sync via serverless /api/discord-events ---- */
async function syncDiscord(){
  const btn=$('#syncBtn'), orig=btn.textContent; btn.textContent='⏳ Syncing…'; btn.disabled=true;
  try{
    const r=await fetch('/api/discord-events');
    const j=await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
    const text=(j.messages||[]).join('\n\n');
    const evs=parseEvents(text,'Discord');
    const added=mergeEvents(evs);
    render();
    toast(`Discord: scanned ${j.messages?j.messages.length:0} messages · added ${added} event${added===1?'':'s'}`);
  }catch(err){
    toast('Discord sync unavailable: '+err.message);
  }finally{ btn.textContent=orig; btn.disabled=false; }
}

$('#prevM').onclick=()=>{cur.setMonth(cur.getMonth()-1);renderMonth()};
$('#nextM').onclick=()=>{cur.setMonth(cur.getMonth()+1);renderMonth()};
$('#todayBtn').onclick=()=>{cur=new Date();cur.setDate(1);renderMonth()};
$('#addBtn').onclick=()=>openForm(null);
$('#importBtn').onclick=openImport;
$('#syncBtn').onclick=syncDiscord;
$('#themeBtn').onclick=()=>applyTheme(document.documentElement.getAttribute('data-theme')==='light'?'dark':'light');
$('#icsBtn').onclick=()=>downloadFile('hackcal-all.ics',icsForEvents(filtered()));
$('#search').oninput=e=>{q=e.target.value;render()};
$('#fmtFilter').onchange=e=>{fmtF=e.target.value;render()};
$('#upChk').onchange=e=>{upOnly=e.target.checked;render()};
$('#openChk').onchange=e=>{openOnly=e.target.checked;render()};
$('#ver').textContent='v2 · '+data.length+' events';

applyTheme(localStorage.getItem('hackcal.theme') || (matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'));
render();
</script>
</body>
</html>
